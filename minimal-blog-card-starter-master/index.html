<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="design a card using html css" />
		<meta name="keywords" content="html css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="icon"
			href="resources/favicon.ico"
			type="image/x-icon"
			sizes="96x96"
		/>

		<title>devChallenges.io | Minimal Blog Card</title>
		<style>
			:root {
				--purple: #7c19ee;
				--purple-secondary: #f2eafd;
				--grey: #e5eaf0;
				--white: #ffffff;
				--white-secondary: #fafaf9;
				--black: #394150;
				--black-secondary: #20293a;
			}
			* {
				font-family: 'Sora', sans-serif;
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				height: 100vh;
				background-color: var(--white);
			}
			main {
				height: 100%;
				display: flex;
				justify-content: center;
				align-items: center;
			}
			.card {
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: start;

				line-height: 1.5;
				font-weight: 400;

				width: 24rem;
				border-radius: 1rem;
				box-shadow: 8px 8px 20px 0px rgba(85, 85, 85, 0.08);
				background-color: var(--white);
				color: var(--black);
			}
			.card-img {
				border-radius: 0.5rem;
			}
			.card-img-container {
				display: flex;
				align-items: center;
				justify-content: center;
				flex-direction: column;
			}
			.card-body {
				padding: 1.5rem;
				display: flex;
				align-items: start;
				justify-content: center;
				gap: 0.75rem;
				flex-direction: column;
			}
			.card h1 {
				color: var(--black-secondary);
				font-size: 1.125rem;
				font-weight: 600;
			}
			.card-description {
				color: var(--black);
				font-size: 0.875rem;
			}
			.card hr {
				margin: 0;
				padding: 0;
				border: 0;
				background-color: var(--grey);
				width: 100%;
				height: 1px;
			}
			.card-author {
				padding: 1rem;
				font-weight: 500;
				font-size: 0.75rem;
			}
			.card-tag {
				font-weight: 600;
				font-size: 0.625rem;
				background-color: var(--purple-secondary);
				color: purple;
				padding: 0.25rem 1rem;
				border-radius: 0.75rem;
			}
		</style>
	</head>
	<body>
		<main>
			<div class="card">
				<div class="card-body">
					<div class="card-img-container">
						<img
							class="card-img"
							src="./resources/Cactus.jpg"
							alt="card-image"
						/>
					</div>
					<div class="card-tag">
						<span>Design</span>
					</div>
					<h1 class="card-title">Embracing Minimalism</h1>
					<p class="card-description">
						From minimalist sculptures to minimalist paintings, this
						blog will inspire you to appreciate the beauty that lies
						in simplicity.
					</p>
				</div>
				<hr />
				<div>
					<p class="card-author">Annie Spratt</p>
				</div>
			</div>
		</main>
	</body>
</html>
