<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
		<link
			rel="icon"
			href="resources/favicon.ico"
			type="image/x-icon"
			sizes="96x96"
		/>
		<title>Flip the coin | devChallenges.io</title>
		<style>
			html,
			* {
				font-family: 'kanit', 'sans-serif';
				background-color: #404a65;
				color: #ecedf0;
				font-size: 16px;
			}

			main {
				display: flex;
				align-items: center;
				justify-content: center;
				flex-direction: column;
			}

			main > *,
			.seperator {
				margin: 0;
				margin-top: 3rem;
			}

			h1 {
				font-size: 4rem;
				font-weight: 900;
				margin: 0;
				text-align: center;
				text-shadow: 2px 2px 0px #35383f;
				-webkit-text-stroke-width: 5px;
				-webkit-text-stroke-color: #35383f;
			}

			p {
				font-size: 1.375rem;
				font-weight: 500;
				margin: 0.125rem;
			}

			.btn {
				width: 10rem;
				height: 3rem;

				outline: 0px;
				border: 0px;
				font-size: 1.25rem;
				font-weight: 600;

				border-radius: 0.5rem;
				cursor: pointer;

				color: #ecedf0;
				background-color: #1F6FB0;
				box-shadow: 0px 4px 0px 0px #1f6fb0;
			}

			#answer {
				height: 3rem;
				font-size: 2rem;
				font-weight: 500;
			}
		</style>
	</head>
	<body>
		<main>
			<div>
				<h1>Flip the coin</h1>
				<p>Press the coin or the button to flip the coin</p>
			</div>
			<img
				id="img"
				src="./resources/heads.svg"
				width="192px"
				alt="heads"
			/>
			<img src="./resources/shadow.svg" width="192px" alt="shadow" />
			<div id="answer"></div>
			<div>
				<button id="btn" class="btn">RANDOM</button>
			</div>
		</main>
	</body>
	<script>
		function clickHandle() {
			const coins = [
				{
					name: 'Heads',
					src: './resources/heads.svg',
				},
				{
					name: 'Tails',
					src: './resources/tails.svg',
				},
			];
			let div = document.getElementById('answer');
			let img = document.getElementById('img');

			const idx = Math.random() < 0.5 ? 0 : 1;
			console.log(idx);
			div.textContent = coins[idx].name;
			img.src = coins[idx].src;
		}

		const btn = document.getElementById('btn');
		btn.onclick = clickHandle;
	</script>
</html>
