<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="design the join our letter page with css and html"
		/>
		<meta name="keywords" content="html css" />
		<link
			rel="icon"
			href="resources/favicon.ico"
			type="image/x-icon"
			sizes="96x96"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet"
		/>
		<title>Join Our Newsletter | devChallenges.io</title>

		<!--You are welcome to delete these styles or modify them in your own stylesheet -->
		<style>
			:root {
				--grey: #6c727f;
				--grey-secondary: #e5e7eb;
				--white: #ffffff;
				--white-secondary: #f9fafb;
				--black: #000000;
				--black-secondary: #394150;
				--blue: #284bce;
			}
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: 'Poppins', sans-serif;
			}
			body {
				height: 100vh;
				background-color: var(--white-secondary);
			}
			main {
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100%;
				gap: 4rem;
			}
			.letter {
				width: 48rem;
				display: flex;
				flex-direction: column;
				gap: 2rem;
				padding: 2rem;
			}
			.letter-header {
				display: flex;
				justify-content: center;
				align-items: center;
				flex-direction: column;
				gap: 1rem;
			}
			.letter-header h1 {
				font-weight: 600;
				font-size: 3rem;
				font-style: normal;
			}
			.letter-header p {
				text-align: center;
				color: var(--grey);
				font-weight: 400;
				font-style: normal;
				font-size: 1.25rem;
			}

			.card input::placeholder {
				font-weight: 600;
				font-style: normal;
				font-size: 1rem;
				text-align: center;
			}
			.card input[type='button'] {
				font-size: 1rem;
				font-weight: 600;
				font-style: normal;
				background-color: var(--blue);
				color: var(--white);
				width: 100%;
			}
			.card p {
				font-size: 0.875rem;
				font-weight: 400;
				color: var(--black-secondary);
			}
			.card input[type='text'] {
				border: 1px solid var(--grey-secondary);
			}
			.card input {
				padding: 1.5rem;
				width: 100%;
				border-radius: 1rem;
				border: 0;
			}
			.card {
				padding: 2rem;
				border-radius: 2rem;
				display: flex;
				flex-direction: column;
				align-items: start;
				justify-content: center;
				gap: 2rem;

				background-color: var(--white);
				box-shadow:
					0px 20px 30px 0px rgba(0, 0, 0, 0.03),
					0px 8px 12px 0px rgba(0, 0, 0, 0.08);
			}
		</style>
	</head>
	<body>
		<main>
			<div class="letter">
				<div class="letter-header">
					<img
						width="64"
						height="auto"
						src="./resources/logo.svg"
						alt="logo"
					/>
					<h1>Join our newsletter</h1>
					<p>
						Keep up with our latest collections, exclusive deals,
						and special offers! We introduce a new collection every
						week, so stay tuned to snag the hottest items just for
						you.
					</p>
				</div>
				<div class="letter-body">
					<form action="post" class="card">
						<input
							type="text"
							name="email"
							id="email"
							placeholder="Enter your email address"
						/>
						<input type="button" value="Subscribe now" />
						<p>
							Your email is 100% confidential and won’t send you
							any spam.
						</p>
					</form>
				</div>
			</div>
		</main>
	</body>
</html>
